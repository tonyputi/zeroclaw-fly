app = "zeroclaw"
primary_region = "ams"

[build]
  image = "ghcr.io/zeroclaw-labs/zeroclaw:latest"

[env]
  PROVIDER                  = "openrouter"
  ZEROCLAW_GATEWAY_PORT     = "42617"
  ZEROCLAW_ALLOW_PUBLIC_BIND = "true"

# API_KEY must be set as a Fly secret:
#   fly secrets set API_KEY="sk-..."

[[mounts]]
  source      = "zeroclaw_data"
  destination = "/zeroclaw-data"

[http_service]
  internal_port        = 42617
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
